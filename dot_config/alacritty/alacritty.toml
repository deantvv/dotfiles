[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.normal]
family = "FiraCode Nerd Font"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Alt"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Alt"

[scrolling]
history = 10000

[window]
decorations = "full"
startup_mode = "Fullscreen"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
